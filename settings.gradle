import java.nio.file.Files

rootProject.name = 'shadow'

// 自动化开关：如果是 JitPack 环境，自动禁用 Sample 和 Test 以加速并确保成功
def isJitPack = System.getenv("JITPACK") == "true"

copyLocalPropertiesForIncludeBuilds()

// 核心 SDK 构建（必须保留）
// 如果 JitPack 编译 coding 模块报错，可以把下面这行移入 if (!isJitPack) 块中
includeBuild 'projects/sdk/coding'
includeBuild 'projects/sdk/core'
includeBuild 'projects/sdk/dynamic'

if (!isJitPack) {
  // 只有在本地开发时才加载这些沉重的模块
  includeTest()
  includeSample()
  includeSampleDynamicApk()
  println "Shadow: 运行在【开发模式】，已加载 Sample 和 Test"
} else {
  println "Shadow: 运行在【发布模式】，已跳过 Sample 和 Test"
}

// --- 以下为官方函数逻辑，保持不变以兼容同步 ---

