      'sample-hello-host'
  project(':sample-hello-api').projectDir = file('projects/sample/dynamic-apk/sample-hello-api')
  project(':sample-hello-api-holder').projectDir = file('projects/sample/dynamic-apk/sample-hello-api-holder')
